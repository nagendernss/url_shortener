<!-- src/main/resources/templates/analytics.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">URL Shortener</a>
        <a class="muted-link ms-auto" th:href="@{/}">← new link</a>
    </div>
</nav>

<div class="container mt-4">
    <!-- Summary -->
    <div class="card">
        <div class="card-header"><h3>Analytics</h3></div>
        <div class="card-body">
            <div class="stat-grid">
                <div class="stat-tile">
                    <div class="k">Total clicks</div>
                    <div class="v" th:text="${analytics.totalClicks}">0</div>
                </div>
                <div class="stat-tile">
                    <div class="k">Short ID</div>
                    <div class="v small" th:text="${analytics.shortId}">-</div>
                </div>
                <div class="stat-tile">
                    <div class="k">Created</div>
                    <div class="v small" th:text="${#temporals.format(analytics.createdAt, 'yyyy-MM-dd HH:mm')}">-</div>
                </div>
            </div>
            <p class="mt-3 mb-0"><span class="k" style="font-family:var(--mono);color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.06em;">Original URL</span><br>
                <a th:href="${analytics.originalUrl}" th:text="${analytics.originalUrl}" target="_blank" style="word-break:break-all;"></a></p>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="row mt-3">
        <div class="col-md-6 mb-3">
            <div class="card h-100">
                <div class="card-header"><h5>Clicks by date</h5></div>
                <div class="card-body">
                    <canvas id="clicksByDateChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card h-100">
                <div class="card-header"><h5>Clicks by referrer</h5></div>
                <div class="card-body">
                    <canvas id="clicksByRefererChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Clicks -->
    <div class="row mb-5">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header"><h5>Recent clicks</h5></div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>Date / time</th>
                                <th>IP address</th>
                                <th>User agent</th>
                                <th>Referrer</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="click : ${analytics.recentClicks}">
                                <td th:text="${#temporals.format(click.clickedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                                <td th:text="${click.ipAddress}"></td>
                                <td th:text="${#strings.abbreviate(click.userAgent, 50)}"></td>
                                <td th:text="${click.referer ?: 'Direct'}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // theme defaults for both charts
    Chart.defaults.color = '#9a9aa6';
    Chart.defaults.borderColor = 'rgba(255,255,255,.08)';
    const EMERALD = '#00d179';

    // Clicks by Date Chart
    const clicksByDateData = /*[[${analytics.clicksByDate}]]*/ {};
    const dateLabels = Object.keys(clicksByDateData).sort();
    const dateValues = dateLabels.map(date => clicksByDateData[date]);

    const ctx1 = document.getElementById('clicksByDateChart').getContext('2d');
    const grad = ctx1.createLinearGradient(0, 0, 0, 300);
    grad.addColorStop(0, 'rgba(0,209,121,.35)');
    grad.addColorStop(1, 'rgba(0,209,121,0)');
    new Chart(ctx1, {
        type: 'line',
        data: {
            labels: dateLabels,
            datasets: [{
                label: 'Clicks',
                data: dateValues,
                borderColor: EMERALD,
                backgroundColor: grad,
                pointBackgroundColor: EMERALD,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
    });

    // Clicks by Referrer Chart
    const clicksByRefererData = /*[[${analytics.clicksByReferer}]]*/ {};
    const refererLabels = Object.keys(clicksByRefererData);
    const refererValues = Object.values(clicksByRefererData);

    const ctx2 = document.getElementById('clicksByRefererChart').getContext('2d');
    new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: refererLabels,
            datasets: [{
                data: refererValues,
                borderColor: '#131318',
                backgroundColor: ['#00d179', '#4d7cff', '#a06bff', '#ffc24b', '#ff6a5f', '#37e096']
            }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
